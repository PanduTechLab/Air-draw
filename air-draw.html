<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Air Draw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #fff;
  }
  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.75;
  }
  #drawCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* TOP BAR */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 10;
  }
  #logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
  }
  #logo span { color: #ff6b6b; }
  #status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #888;
    transition: background 0.3s;
  }
  #status-dot.drawing { background: #ff6b6b; box-shadow: 0 0 8px #ff6b6b; }
  #status-dot.ready { background: #4ade80; box-shadow: 0 0 8px #4ade80; }

  /* SIDEBAR */
  #sidebar {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
    background: rgba(10,10,20,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 18px 12px;
    backdrop-filter: blur(12px);
  }
  #sidebar .section-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center;
    margin-bottom: -4px;
  }

  /* Color swatches */
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active {
    border-color: rgba(255,255,255,0.8);
    transform: scale(1.15);
  }

  /* Size slider */
  #size-slider {
    writing-mode: vertical-lr;
    direction: rtl;
    appearance: none;
    -webkit-appearance: none;
    width: 6px;
    height: 90px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    cursor: pointer;
    margin: 0 auto;
    display: block;
    outline: none;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  /* Action buttons */
  .action-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .action-btn.active {
    background: rgba(255, 100, 100, 0.25);
    border-color: rgba(255,100,100,0.5);
  }
  .separator {
    width: 28px;
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin: 0 auto;
  }

  /* BOTTOM BAR */
  #bottombar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    z-index: 10;
  }
  #gesture-hint {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }
  #gesture-hint .hint-icon { font-size: 18px; }
  #mode-label {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #mode-label span {
    color: #fff;
    font-weight: 700;
  }

  /* Loading overlay */
  #loading {
    position: absolute;
    inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
  }
  #loading-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #fff;
  }
  #loading-title span { color: #ff6b6b; }
  #loading-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
  }
  .loader-ring {
    width: 48px; height: 48px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #ff6b6b;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Eraser cursor indicator */
  #cursor-indicator {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    transform: translate(-50%, -50%);
    transition: opacity 0.2s;
    opacity: 0;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    right: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 10px;
    white-space: nowrap;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.05em;
  }
  .action-btn:hover .tooltip { opacity: 1; }

  /* Palm eraser sweep overlay */
  #palm-eraser-ring {
    position: absolute;
    pointer-events: none;
    z-index: 25;
    border-radius: 50%;
    border: 3px solid rgba(255,100,100,0.9);
    background: rgba(255,60,60,0.12);
    transform: translate(-50%, -50%);
    transition: opacity 0.15s;
    opacity: 0;
    box-shadow: 0 0 20px rgba(255,80,80,0.5), inset 0 0 20px rgba(255,80,80,0.1);
  }
  #palm-eraser-ring.active { opacity: 1; }

  /* Erase flash */
  @keyframes eraseFlash {
    0%   { opacity: 0.35; }
    100% { opacity: 0; }
  }
  #erase-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,80,80,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 22;
    opacity: 0;
  }
  #erase-flash.flashing { animation: eraseFlash 0.4s ease-out forwards; }

  /* Video quality panel */
  #quality-panel {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
    background: rgba(10,10,20,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 18px 12px;
    backdrop-filter: blur(12px);
    min-width: 52px;
  }
  #quality-panel .section-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center;
    margin-bottom: -4px;
  }
  .q-slider {
    writing-mode: vertical-lr;
    direction: rtl;
    appearance: none;
    -webkit-appearance: none;
    width: 6px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    cursor: pointer;
    margin: 0 auto;
    display: block;
    outline: none;
  }
  .q-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .q-val {
    font-size: 9px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
  }

  /* Gesture hint — updated */
  #gesture-hint { flex-wrap: wrap; }
</style>
</head>
<body>

<div id="container">
  <!-- Loading screen -->
  <div id="loading">
    <div class="loader-ring"></div>
    <div id="loading-title">✦ AIR <span>DRAW</span></div>
    <div id="loading-sub" id="loading-msg">Loading MediaPipe Hands...</div>
  </div>

  <!-- Video feed -->
  <video id="video" autoplay muted playsinline></video>

  <!-- Palm eraser ring visual -->
  <div id="palm-eraser-ring"></div>
  <!-- Erase flash effect -->
  <div id="erase-flash"></div>

  <!-- Video Quality Panel (left sidebar) -->
  <div id="quality-panel">
    <div class="section-label">Cam</div>
    <div class="section-label" style="font-size:8px;color:rgba(255,255,255,0.25);">BRIGHT</div>
    <input type="range" class="q-slider" id="q-brightness" min="50" max="200" value="120">
    <div class="q-val" id="v-brightness">120</div>
    <div class="separator" style="width:28px;height:1px;background:rgba(255,255,255,0.1);margin:0 auto;"></div>
    <div class="section-label" style="font-size:8px;color:rgba(255,255,255,0.25);">CONTR</div>
    <input type="range" class="q-slider" id="q-contrast" min="50" max="200" value="110">
    <div class="q-val" id="v-contrast">110</div>
    <div class="separator" style="width:28px;height:1px;background:rgba(255,255,255,0.1);margin:0 auto;"></div>
    <div class="section-label" style="font-size:8px;color:rgba(255,255,255,0.25);">SAT</div>
    <input type="range" class="q-slider" id="q-saturation" min="0" max="200" value="120">
    <div class="q-val" id="v-saturation">120</div>
    <div class="separator" style="width:28px;height:1px;background:rgba(255,255,255,0.1);margin:0 auto;"></div>
    <div class="section-label" style="font-size:8px;color:rgba(255,255,255,0.25);">SHARP</div>
    <input type="range" class="q-slider" id="q-sharpness" min="0" max="5" value="0" step="1">
    <div class="q-val" id="v-sharpness">0</div>
    <div class="separator" style="width:28px;height:1px;background:rgba(255,255,255,0.1);margin:0 auto;"></div>
    <div class="section-label" style="font-size:8px;color:rgba(255,255,255,0.25);">OPAC</div>
    <input type="range" class="q-slider" id="q-opacity" min="30" max="100" value="75">
    <div class="q-val" id="v-opacity">75</div>
  </div>

  <!-- Drawing canvas (persistent strokes) -->
  <canvas id="drawCanvas"></canvas>

  <!-- Overlay canvas (finger tracking visuals) -->
  <canvas id="overlayCanvas"></canvas>

  <!-- Cursor indicator (for eraser) -->
  <div id="cursor-indicator"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div id="logo">✦ AIR <span>DRAW</span></div>
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">Initializing</span>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="section-label">Color</div>
    <div id="color-swatches" style="display:flex;flex-direction:column;gap:8px;align-items:center;"></div>

    <div class="separator"></div>
    <div class="section-label">Size</div>
    <input type="range" id="size-slider" min="1" max="20" value="3">

    <div class="separator"></div>
    <div class="section-label">Tools</div>
    <button class="action-btn" id="btn-eraser" onclick="toggleEraser()" title="Eraser">
      ✏️<span class="tooltip">Eraser</span>
    </button>
    <button class="action-btn" id="btn-clear" onclick="clearCanvas()" title="Clear">
      🗑<span class="tooltip">Clear all</span>
    </button>
    <button class="action-btn" id="btn-save" onclick="saveCanvas()" title="Save">
      💾<span class="tooltip">Save image</span>
    </button>
  </div>

  <!-- Bottom bar -->
  <div id="bottombar">
    <div id="gesture-hint">
      <span class="hint-icon">☝️</span>
      <span>Index → <strong>Draw</strong> &nbsp;|&nbsp; ✌️ Two fingers → <strong>Pause</strong> &nbsp;|&nbsp; 🖐 Open palm → <strong>Erase area</strong> &nbsp;|&nbsp; Fist → <strong>Idle</strong></span>
    </div>
    <div id="mode-label">Mode: <span id="current-mode">IDLE</span></div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// AIR DRAW — Core Engine v3
// Key improvements:
//   1. Catmull-Rom spline: zero dotting, buttery curves even at fast speeds
//   2. Fire particle system at fingertip (rAF loop, independent of MediaPipe)
//   3. Palm erase only triggers when hand is NOT in draw mode
//   4. Adaptive smoothing: less lag at fast speeds, more at slow speeds
// ══════════════════════════════════════════════════════════════════════════════

// ── STATE ────────────────────────────────────────────────────────────────────
const COLORS = [
  { hex: '#ff6b6b', name: 'Neon Red' },
  { hex: '#ffd93d', name: 'Neon Yellow' },
  { hex: '#6bcb77', name: 'Neon Green' },
  { hex: '#4d96ff', name: 'Neon Blue' },
  { hex: '#ff922b', name: 'Orange' },
  { hex: '#cc5de8', name: 'Purple' },
  { hex: '#ffffff', name: 'White' },
];

let currentColor = COLORS[0].hex;
let brushSize = 3;
let isErasing = false;
let isDrawing = false;

// Raw landmark positions (set each frame)
let rawX = null, rawY = null;
// Smoothed display position
let smoothX = null, smoothY = null;
// Point buffer for spline: keep last 4 points
let ptBuf = [];
// Current stroke being built
let currentStroke = null;
let strokeHistory = [];
// Current gesture
let currentGesture = 'IDLE';
// Fingertip position for particle system
let fireX = -999, fireY = -999, fireActive = false;

// ── CANVAS SETUP ─────────────────────────────────────────────────────────────
const drawCanvas    = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const dCtx = drawCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');
const video = document.getElementById('video');

function resizeCanvases() {
  drawCanvas.width    = window.innerWidth;
  drawCanvas.height   = window.innerHeight;
  overlayCanvas.width = window.innerWidth;
  overlayCanvas.height= window.innerHeight;
  redrawHistory();
}
window.addEventListener('resize', resizeCanvases);
resizeCanvases();

// ── COLOR SWATCHES ────────────────────────────────────────────────────────────
const swatchContainer = document.getElementById('color-swatches');
COLORS.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'color-swatch' + (i === 0 ? ' active' : '');
  el.style.background  = c.hex;
  el.style.boxShadow   = `0 0 10px ${c.hex}60`;
  el.title = c.name;
  el.onclick = () => selectColor(c.hex, el);
  swatchContainer.appendChild(el);
});

function selectColor(hex, el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  currentColor = hex;
  isErasing = false;
  document.getElementById('btn-eraser').classList.remove('active');
}

document.getElementById('size-slider').oninput = function() {
  brushSize = parseInt(this.value);
};

// ── NEON LINE RENDERER ────────────────────────────────────────────────────────
// Renders a single segment with 4-layer neon glow (no dotting — called from spline)
function renderSegment(x1, y1, x2, y2, color, size) {
  const sz = Math.max(size, 2);
  // Layer 1 — wide ambient bloom
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2);
  dCtx.strokeStyle = color; dCtx.lineWidth = sz * 1.0;
  dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
  dCtx.globalAlpha = 0.04; dCtx.shadowBlur = 0; dCtx.stroke();
  // Layer 2 — color halo
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2);
  dCtx.lineWidth = sz * 0.55; dCtx.globalAlpha = 0.18; dCtx.stroke();
  // Layer 3 — neon tube
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2);
  dCtx.lineWidth = sz; dCtx.globalAlpha = 1.0;
  dCtx.shadowBlur = sz * 0.8; dCtx.shadowColor = color; dCtx.stroke();
  dCtx.shadowBlur = 0;
  // Layer 4 — bright white filament
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2);
  dCtx.strokeStyle = '#ffffff'; dCtx.lineWidth = sz * 0.12;
  dCtx.globalAlpha = 0.6;
  dCtx.shadowBlur = sz * 0.4; dCtx.shadowColor = '#fff'; dCtx.stroke();
  // Reset
  dCtx.globalAlpha = 1.0; dCtx.shadowBlur = 0; dCtx.strokeStyle = color;
}

// ── CATMULL-ROM SPLINE ────────────────────────────────────────────────────────
// Interpolates through control points so strokes are continuous even at high speed.
// Call addPoint() each frame while drawing; it auto-renders the curve.
function catmullRomSegment(p0, p1, p2, p3, color, size) {
  const steps = Math.max(6, Math.ceil(dist(p1, p2) / 2));
  let px = p1.x, py = p1.y;
  for (let i = 1; i <= steps; i++) {
    const t  = i / steps;
    const t2 = t*t, t3 = t2*t;
    const x = 0.5*(
      (2*p1.x) +
      (-p0.x+p2.x)*t +
      (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 +
      (-p0.x+3*p1.x-3*p2.x+p3.x)*t3
    );
    const y = 0.5*(
      (2*p1.y) +
      (-p0.y+p2.y)*t +
      (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 +
      (-p0.y+3*p1.y-3*p2.y+p3.y)*t3
    );
    renderSegment(px, py, x, y, color, size);
    px = x; py = y;
  }
}

function dist(a, b) {
  const dx=a.x-b.x, dy=a.y-b.y;
  return Math.sqrt(dx*dx+dy*dy);
}

function addPoint(x, y) {
  const pt = {x, y};
  ptBuf.push(pt);
  if (currentStroke) currentStroke.points.push(pt);

  if (ptBuf.length >= 4) {
    const [p0,p1,p2,p3] = ptBuf.slice(-4);
    catmullRomSegment(p0, p1, p2, p3, currentColor, brushSize);
  } else if (ptBuf.length === 2) {
    // render a direct line for the first two points so there's no initial gap
    renderSegment(ptBuf[0].x, ptBuf[0].y, ptBuf[1].x, ptBuf[1].y, currentColor, brushSize);
  }
}

function startStroke(x, y) {
  ptBuf = [{x, y}];
  currentStroke = { type:'draw', color:currentColor, size:brushSize, points:[{x,y}] };
}

function endStroke() {
  // Flush remaining buffer (draw last 1-2 points)
  if (ptBuf.length >= 3) {
    const last = ptBuf[ptBuf.length-1];
    // duplicate last point as phantom to close the spline
    catmullRomSegment(ptBuf[ptBuf.length-3], ptBuf[ptBuf.length-2], last, last, currentColor, brushSize);
  }
  if (currentStroke && currentStroke.points.length > 1) {
    strokeHistory.push(currentStroke);
  }
  currentStroke = null;
  ptBuf = [];
}

// ── HISTORY & REDRAW ──────────────────────────────────────────────────────────
function redrawHistory() {
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  strokeHistory.forEach(stroke => {
    if (stroke.type === 'erase') {
      eraseCircle(stroke.x, stroke.y, stroke.r);
    } else if (stroke.points.length >= 4) {
      for (let i = 0; i < stroke.points.length - 3; i++) {
        catmullRomSegment(stroke.points[i], stroke.points[i+1], stroke.points[i+2], stroke.points[i+3], stroke.color, stroke.size);
      }
    } else if (stroke.points.length >= 2) {
      for (let i = 1; i < stroke.points.length; i++) {
        renderSegment(stroke.points[i-1].x, stroke.points[i-1].y, stroke.points[i].x, stroke.points[i].y, stroke.color, stroke.size);
      }
    }
  });
}

function eraseCircle(x, y, r) {
  dCtx.save();
  dCtx.globalCompositeOperation = 'destination-out';
  dCtx.beginPath();
  dCtx.arc(x, y, r, 0, Math.PI*2);
  dCtx.fillStyle = 'rgba(0,0,0,1)';
  dCtx.fill();
  dCtx.restore();
}

function clearCanvas() {
  dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  strokeHistory = [];
}

function saveCanvas() {
  const merged = document.createElement('canvas');
  merged.width  = drawCanvas.width;
  merged.height = drawCanvas.height;
  const mCtx = merged.getContext('2d');
  mCtx.fillStyle = '#0a0a0f';
  mCtx.fillRect(0, 0, merged.width, merged.height);
  mCtx.drawImage(drawCanvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'air-draw.png';
  link.href = merged.toDataURL('image/png');
  link.click();
}

function toggleEraser() {
  isErasing = !isErasing;
  document.getElementById('btn-eraser').classList.toggle('active', isErasing);
}

// ── FIRE PARTICLE SYSTEM ──────────────────────────────────────────────────────
// Runs on requestAnimationFrame — fully independent of MediaPipe timing.
// Each particle: { x, y, vx, vy, life, maxLife, size, hue }
const particles = [];
const MAX_PARTICLES = 120;

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if(max!==min){ const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; } }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function spawnFireParticles(x, y) {
  if (!fireActive) return;
  const [h] = hexToHsl(currentColor);
  const count = 4 + Math.floor(Math.random()*3);
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
    const angle = -Math.PI/2 + (Math.random()-0.5)*1.2; // mostly upward
    const speed = 1.5 + Math.random()*2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed + (Math.random()-0.5)*0.8,
      vy: Math.sin(angle)*speed - 0.5,
      life: 1.0,
      decay: 0.04 + Math.random()*0.04,
      size: 2 + Math.random()*4,
      hue: h + (Math.random()-0.5)*30,
      sat: 90 + Math.random()*10,
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy -= 0.06; // gravity upward (fire rises)
    p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i,1); }
  }
}

function drawParticles() {
  oCtx.save();
  particles.forEach(p => {
    const lum = 55 + (1-p.life)*30; // brightens as it fades
    const alpha = p.life * p.life;
    oCtx.globalAlpha = alpha;
    oCtx.shadowBlur = 8;
    oCtx.shadowColor = `hsl(${p.hue},${p.sat}%,${lum}%)`;
    oCtx.fillStyle   = `hsl(${p.hue},${p.sat}%,${lum}%)`;
    oCtx.beginPath();
    oCtx.arc(p.x, p.y, p.size*(0.3+p.life*0.7), 0, Math.PI*2);
    oCtx.fill();
  });
  oCtx.globalAlpha = 1;
  oCtx.shadowBlur  = 0;
  oCtx.restore();
}

// Draw the glowing dot at fingertip (fire source)
function drawFingerTip(x, y, gesture) {
  if (gesture !== 'DRAW') return;
  oCtx.save();
  // Outer pulse ring
  oCtx.beginPath();
  oCtx.arc(x, y, brushSize*0.7+10, 0, Math.PI*2);
  oCtx.strokeStyle = currentColor;
  oCtx.lineWidth = 2;
  oCtx.globalAlpha = 0.5 + 0.3*Math.sin(Date.now()*0.01);
  oCtx.shadowBlur = 18;
  oCtx.shadowColor = currentColor;
  oCtx.stroke();
  // Core hot dot
  oCtx.beginPath();
  oCtx.arc(x, y, brushSize*0.6, 0, Math.PI*2);
  oCtx.fillStyle = '#ffffff';
  oCtx.globalAlpha = 0.95;
  oCtx.shadowBlur = 20;
  oCtx.shadowColor = '#ffffff';
  oCtx.fill();
  // Color halo
  oCtx.beginPath();
  oCtx.arc(x, y, brushSize*1.1, 0, Math.PI*2);
  oCtx.fillStyle = currentColor;
  oCtx.globalAlpha = 0.4;
  oCtx.shadowBlur = 15;
  oCtx.shadowColor = currentColor;
  oCtx.fill();
  oCtx.globalAlpha = 1;
  oCtx.shadowBlur  = 0;
  oCtx.restore();
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────────
// This runs at 60fps — independently of MediaPipe (which runs at ~30fps)
// It handles: particle spawning + rendering, fingertip dot, hand skeleton
let lastSkeleton = null; // stored from last MediaPipe frame

function animLoop() {
  requestAnimationFrame(animLoop);

  // Spawn fire from last known fingertip if drawing
  if (fireActive && smoothX !== null) {
    spawnFireParticles(smoothX, smoothY);
  }
  updateParticles();

  // Clear overlay
  oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  // Draw skeleton if we have one
  if (lastSkeleton) drawSkeleton(lastSkeleton.lm, lastSkeleton.gesture);

  // Draw particles on top of skeleton
  drawParticles();

  // Draw fingertip dot on top of everything
  if (smoothX !== null && lastSkeleton) {
    drawFingerTip(smoothX, smoothY, lastSkeleton.gesture);
  }
}
animLoop();

// ── HAND SKELETON ─────────────────────────────────────────────────────────────
const TIPS = { thumb:4, index:8, middle:12, ring:16, pinky:20 };
const PIPS = { index:6, middle:10, ring:14, pinky:18 };
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

function drawSkeleton(landmarks, gesture) {
  const W = overlayCanvas.width, H = overlayCanvas.height;
  const alpha = gesture === 'DRAW' ? 0.5 : 0.2;
  oCtx.strokeStyle = `rgba(255,255,255,${alpha*0.5})`;
  oCtx.lineWidth = 1;
  CONNECTIONS.forEach(([a,b]) => {
    oCtx.beginPath();
    oCtx.moveTo((1-landmarks[a].x)*W, landmarks[a].y*H);
    oCtx.lineTo((1-landmarks[b].x)*W, landmarks[b].y*H);
    oCtx.stroke();
  });
  landmarks.forEach((lm,i) => {
    const x=(1-lm.x)*W, y=lm.y*H;
    oCtx.beginPath();
    oCtx.arc(x, y, i===TIPS.index?5:2.5, 0, Math.PI*2);
    oCtx.fillStyle = `rgba(255,255,255,${alpha*0.6})`;
    oCtx.fill();
  });
}

// ── GESTURE CLASSIFICATION ────────────────────────────────────────────────────
function fingerUp(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

function classifyGesture(lm) {
  const idx  = fingerUp(lm, TIPS.index,  PIPS.index);
  const mid  = fingerUp(lm, TIPS.middle, PIPS.middle);
  const rng  = fingerUp(lm, TIPS.ring,   PIPS.ring);
  const pnk  = fingerUp(lm, TIPS.pinky,  PIPS.pinky);
  if (idx && !mid && !rng && !pnk)  return 'DRAW';
  if (idx && mid  && !rng && !pnk)  return 'PAUSE';
  if (idx && mid  &&  rng &&  pnk)  return 'PALM_ERASE';
  return 'IDLE';
}

// ── STATUS UI ─────────────────────────────────────────────────────────────────
function setStatus(text, mode) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (mode) dot.classList.add(mode);
  document.getElementById('current-mode').textContent = text.toUpperCase();
}

// ── MEDIAPIPE RESULTS ─────────────────────────────────────────────────────────
// Adaptive EMA: responds faster when finger moves fast
let emaX = null, emaY = null;
const EMA_SLOW = 0.55;  // smooth at slow speeds
const EMA_FAST = 0.05;  // near-raw: tracks fast movement with almost no lag

function onResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    // Hand lost — end stroke gracefully
    if (isDrawing) { endStroke(); isDrawing = false; }
    emaX = null; emaY = null; smoothX = null; smoothY = null;
    fireActive = false;
    lastSkeleton = null;
    setStatus('No hand', '');
    return;
  }

  const lm      = results.multiHandLandmarks[0];
  const gesture = classifyGesture(lm);
  const W = overlayCanvas.width, H = overlayCanvas.height;

  // Use landmark 8 (fingertip) but offset toward actual visual tip
  // Finger vector: from knuckle (lm[5]) toward tip (lm[8]) — extend slightly past tip
  const tipX8 = (1 - lm[8].x) * W;
  const tipY8 = lm[8].y * H;
  const knkX  = (1 - lm[5].x) * W;
  const knkY  = lm[5].y * H;
  const fdx = tipX8 - knkX, fdy = tipY8 - knkY;
  const flen = Math.sqrt(fdx*fdx + fdy*fdy) || 1;
  // Push 12% of finger length past the landmark to hit the visual fingernail tip
  const OFFSET = 0.12;
  rawX = tipX8 + (fdx/flen) * flen * OFFSET;
  rawY = tipY8 + (fdy/flen) * flen * OFFSET;

  // Adaptive smoothing based on speed
  if (emaX === null) { emaX = rawX; emaY = rawY; }
  const speed = Math.sqrt((rawX-emaX)**2 + (rawY-emaY)**2);
  // Speed tiers: fast → pure raw (zero lag), medium → light blend, slow → smooth
  if (speed > 12) {
    // Pure raw — 1:1 with hand, no lag at all
    smoothX = rawX; smoothY = rawY;
    emaX = rawX;    emaY = rawY;   // resync EMA to raw so next frame is clean
  } else if (speed > 5) {
    emaX = emaX * 0.70 + rawX * 0.30;
    emaY = emaY * 0.70 + rawY * 0.30;
    smoothX = emaX; smoothY = emaY;
  } else {
    emaX = emaX * 0.50 + rawX * 0.50;
    emaY = emaY * 0.50 + rawY * 0.50;
    smoothX = emaX; smoothY = emaY;
  }

  // Store skeleton for animation loop
  lastSkeleton = { lm, gesture };

  // Update cursor indicator (eraser mode)
  const ci = document.getElementById('cursor-indicator');
  ci.style.left   = smoothX + 'px';
  ci.style.top    = smoothY + 'px';
  ci.style.width  = (brushSize * 4) + 'px';
  ci.style.height = (brushSize * 4) + 'px';
  ci.style.opacity = (isErasing && gesture === 'DRAW') ? '1' : '0';

  if (gesture === 'DRAW') {
    fireActive = true;
    setStatus('Drawing', 'drawing');

    if (!isErasing) {
      if (!isDrawing) {
        startStroke(smoothX, smoothY);
        isDrawing = true;
      } else {
        // Only add point if we moved enough (prevents dot-stacking when still)
        const last = ptBuf[ptBuf.length-1];
        const d = Math.sqrt((smoothX-last.x)**2 + (smoothY-last.y)**2);
        if (d > 0.5) addPoint(smoothX, smoothY);
      }
    } else {
      // Eraser mode: erase circle under fingertip
      const r = brushSize * 2.5;
      eraseCircle(smoothX, smoothY, r);
      strokeHistory.push({ type:'erase', x:smoothX, y:smoothY, r });
    }

  } else {
    fireActive = false;
    if (isDrawing) { endStroke(); isDrawing = false; }

    if (gesture === 'PALM_ERASE') {
      // Erase large circle under palm centre (landmark 9 = base of middle finger)
      const px = (1 - lm[9].x) * W;
      const py = lm[9].y * H;
      const palmW = Math.abs((1-lm[5].x)*W - (1-lm[17].x)*W);
      const r = Math.max(palmW * 1.5, 70);
      eraseCircle(px, py, r);
      strokeHistory.push({ type:'erase', x:px, y:py, r });
      setStatus('Erasing', 'drawing');
    } else if (gesture === 'PAUSE') {
      setStatus('Paused', 'ready');
    } else {
      setStatus('Ready', 'ready');
    }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  const loadMsg = document.getElementById('loading-sub');
  try {
    loadMsg.textContent = 'Requesting camera access...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30,min:24}, facingMode:'user' },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();

    loadMsg.textContent = 'Loading hand tracking model...';
    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.72,
      minTrackingConfidence: 0.65,
    });
    hands.onResults(onResults);

    loadMsg.textContent = 'Starting camera...';
    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280, height: 720
    });
    await camera.start();

    document.getElementById('loading').style.transition = 'opacity 0.6s';
    document.getElementById('loading').style.opacity   = '0';
    setTimeout(() => document.getElementById('loading').remove(), 700);
    setStatus('Ready', 'ready');

  } catch (err) {
    loadMsg.style.color = '#ff6b6b';
    loadMsg.textContent = err.name === 'NotAllowedError'
      ? '⚠ Camera access denied. Please allow camera and reload.'
      : '⚠ Error: ' + err.message;
    console.error(err);
  }
}
initApp();

// ── VIDEO QUALITY CONTROLS ────────────────────────────────────────────────────
function updateVideoFilter() {
  const br  = document.getElementById('q-brightness').value;
  const con = document.getElementById('q-contrast').value;
  const sat = document.getElementById('q-saturation').value;
  const sh  = parseInt(document.getElementById('q-sharpness').value);
  const op  = document.getElementById('q-opacity').value;
  document.getElementById('v-brightness').textContent = br;
  document.getElementById('v-contrast').textContent   = con;
  document.getElementById('v-saturation').textContent = sat;
  document.getElementById('v-sharpness').textContent  = sh;
  document.getElementById('v-opacity').textContent    = op;
  const sharpMap = ['','contrast(120%)','contrast(132%)','contrast(145%)','contrast(158%)','contrast(172%)'];
  const base = `brightness(${br}%) contrast(${con}%) saturate(${sat}%)`;
  video.style.filter  = sh > 0 ? base + ' ' + sharpMap[sh] : base;
  video.style.opacity = op / 100;
}
['q-brightness','q-contrast','q-saturation','q-sharpness','q-opacity'].forEach(id =>
  document.getElementById(id).addEventListener('input', updateVideoFilter)
);
updateVideoFilter();
